name: Daily Dev Radar Scan

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run radar scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RADAR_TIMEZONE: Asia/Singapore
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run scan

      - name: Commit and push updated data
        run: |
          git config user.name "wxcc-devcorner[bot]"
          git config user.email "wxcc-devcorner[bot]@users.noreply.github.com"
          git add data/latest.json data/snapshot.json data/daily-history.json data/cards.json
          git diff --staged --quiet || git commit -m "scan: $(date -u +%Y-%m-%d)"
          git push
